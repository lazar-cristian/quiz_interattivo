<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fase 2: Personalizzare il titolo della pagina -->
    <title>Quiz sul Calcio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Struttura base del quiz (Fase 2) -->
    <div id="quiz-container">
        <h1>Quiz sul Calcio</h1>
        
        <!-- Contenitore della domanda -->
        <h2 id="titolo-domanda">Domanda</h2>
        
        <!-- Contenitore delle opzioni (radio buttons) -->
        <div id="opzioni">
            <!-- Le opzioni verranno inserite qui da JavaScript -->
        </div>
        
        <!-- Pulsante per controllare la risposta -->
        <button id="btn-controlla">Controlla Risposta</button>
        
        <!-- Messaggio di feedback (corretto/errato) -->
        <p id="feedback"></p>
        
        <!-- Punteggio finale aggiornato -->
        <p id="testo-punteggio">Punteggio: <span id="punteggio">0</span></p>
    </div>

    <!-- Collegamento al file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
